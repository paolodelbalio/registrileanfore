<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>Dashboard Piscina 2026</h1>
        <p>Seleziona un registro per visualizzare i dati</p>
    </header>

    <div class="top-buttons">
        <button id="btn-chimico" onclick="apriRegistro('chimicoSection', this)">🧪 Chimico</button>
        <button id="btn-contatori" onclick="apriRegistro('contatoriSection', this)">💧 Contatori</button>
        <button id="btn-pulizie" onclick="apriRegistro('pulizieSection', this)">🧹 Pulizie</button>
        <button id="btn-manutenzioni" onclick="apriRegistro('manutenzioniSection', this)">🛠️ Manutenzioni</button>
    </div>

    <section id="chimicoSection" class="register-section hidden">
        <h2>Registro Chimico</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="chimicoTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="contatoriSection" class="register-section hidden">
        <h2>Registro Contatori</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="contatoriTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="pulizieSection" class="register-section hidden">
        <h2>Registro Pulizie</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="pulizieTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="manutenzioniSection" class="register-section hidden">
        <h2>Registro Manutenzioni</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="tabellaManutenzioniIsolata" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <div id="chartOverlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="overlay-close" onclick="closeOverlay()">✖</span>
            <h3 id="overlayTitle">Andamento Storico</h3>
            <div style="flex-grow:1; position:relative; width:100%; height:calc(100% - 40px);">
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>
    </div>

    <div id="dosageModal" class="overlay hidden">
        <div class="dosage-card">
            <span class="overlay-close" onclick="chiudiDosaggio()">✖</span>
            <div id="dosageContent"></div>
            <button class="dosage-close-btn" onclick="chiudiDosaggio()">Chiudi Finestra</button>
        </div>
    </div>

    <script>
        function apriRegistro(idSezione, bottoneCliccato) {
            // Mostra la sezione selezionata e nasconde le altre
            document.querySelectorAll('.register-section').forEach(sec => sec.classList.add('hidden'));
            document.querySelectorAll('.top-buttons button').forEach(btn => btn.classList.remove('active'));
            
            const sezioneAttiva = document.getElementById(idSezione);
            if (!sezioneAttiva) return;
            
            sezioneAttiva.classList.remove('hidden');
            bottoneCliccato.classList.add('active');
            window.dispatchEvent(new Event('resize'));

            // Applica lo scroll calcolato sui dati effettivi inseriti dall'utente
            setTimeout(() => {
                const wrapper = sezioneAttiva.querySelector('.table-wrapper');
                const righe = sezioneAttiva.querySelectorAll('tbody tr');
                if (!wrapper || righe.length === 0) return;

                let indiceUltimaRigaPiena = -1;

                // Analizziamo le righe dal basso verso l'alto
                for (let i = righe.length - 1; i >= 0; i--) {
                    let celle = righe[i].querySelectorAll('td');
                    let haDatiVeri = false;

                    // Ignoriamo la cella 0 (Data) e la cella 1 (Ora). Controlliamo solo i parametri reali inseriti
                    for (let j = 2; j < celle.length; j++) {
                        let contenuto = celle[j].textContent.trim();
                        // Se c'è un valore scritto che non sia vuoto o un semplice "0" di default
                        if (contenuto !== "" && contenuto !== "0" && contenuto !== "0,0" && contenuto !== "0.0") {
                            haDatiVeri = true;
                            break;
                        }
                    }

                    if (haDatiVeri) {
                        indiceUltimaRigaPiena = i;
                        break;
                    }
                }

                // Se trova la riga con i dati veri (il presente), scende fino a lì lasciando 2 righe vuote sotto di margine
                if (indiceUltimaRigaPiena !== -1) {
                    let indiceVisuale = Math.min(indiceUltimaRigaPiena + 2, righe.length - 1);
                    let rigaMargine = righe[indiceVisuale];
                    
                    wrapper.scrollTop = rigaMargine.offsetTop - wrapper.clientHeight + rigaMargine.clientHeight + 10;
                } else {
                    // Se per assurdo non trovasse nulla, rimane in cima
                    wrapper.scrollTop = 0;
                }
            }, 300); // Ritardo fisso sicuro per il rendering dei dati da Git
        }
    </script>

    <script src="script.js"></script>
    <script src="contatori.js"></script>
    <script src="manutenzioni.js"></script>

</body>
</html>
