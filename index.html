<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Stile aggiuntivo per la struttura a schede */
        .tab-content { display: none; padding: 20px; background: white; }
        .tab-content.active { display: block; }
        .top-buttons button.active { background-color: #004488; color: white; border-color: #004488; }
    </style>
</head>
<body>

<header>
    <h1>Dashboard Piscina 2026</h1>
</header>

<div class="top-buttons">
    <button class="tab-button active" onclick="openTab(event, 'chimico')">Chimico</button>
    <button class="tab-button" onclick="openTab(event, 'contatori')">Contatori</button>
    <button class="tab-button" onclick="openTab(event, 'pulizie')">Pulizie</button>
    <button class="tab-button" onclick="openTab(event, 'manutenzioni')">Manutenzioni</button>
</div>

<div class="container">
    <div id="chimico" class="tab-content active">
        <h2>Registro Chimico</h2>
        </div>

    <div id="contatori" class="tab-content">
        <h2>Registro Contatori</h2>
    </div>

    <div id="pulizie" class="tab-content">
        <h2>Registro Pulizie</h2>
    </div>

    <div id="manutenzioni" class="tab-content">
        <h2>Registro Manutenzioni</h2>
        <table>
            <thead>
                <tr><th>Data</th><th>Impianto/Area</th><th>Intervento</th><th>Tecnico</th><th>Note</th></tr>
            </thead>
            <tbody id="manutenzioni-body"></tbody>
        </table>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="script.js"></script>

<script>
    function openTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // Caricamento specifico per Manutenzioni
    document.addEventListener("DOMContentLoaded", () => {
        Papa.parse("REGISTRO MANUTENZIONE.csv", {
            download: true,
            header: true,
            complete: function(results) {
                const body = document.getElementById('manutenzioni-body');
                body.innerHTML = results.data.map(row => `
                    <tr>
                        <td>${row.Data || ''}</td>
                        <td>${row['Impianto/Area'] || ''}</td>
                        <td>${row.Intervento || ''}</td>
                        <td>${row.Tecnico || ''}</td>
                        <td>${row.Note || ''}</td>
                    </tr>
                `).join('');
            }
        });
    });
</script>
</body>
</html>
