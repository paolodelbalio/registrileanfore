<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Dashboard Piscina 2026</h1>
        <p>Piscina Anfore — Registro Digitale Autocontrollo</p>
    </header>

    <div class="top-buttons">
        <button onclick="mostraSezione('chimicoSection')">🧪 1. Registro Chimico</button>
        <button onclick="mostraSezione('contatoriSection')">💧 2. Consumo Idrico</button>
        <button onclick="mostraSezione('pulizieSection')">🧹 3. Registro Pulizie</button>
        <button onclick="mostraSezione('manutenzioniSection')">🛠️ 4. Manutenzioni</button>
    </div>

    <main>
        <section id="chimicoSection" class="register-section">
            <h2>1. Registro Parametri Chimici (pH, Cloro, CYA)</h2>
            <div class="table-wrapper">
                <table id="chimicoTable"></table>
            </div>
        </section>

        <section id="contatoriSection" class="register-section hidden">
            <h2>2. Registro Consumo Idrico (Letture e Reintegri)</h2>
            <div class="table-wrapper">
                <table id="contatoriTable"></table>
            </div>
        </section>

        <section id="pulizieSection" class="register-section hidden">
            <h2>3. Registro Lavaggio Filtri e Pulizie Vasca</h2>
            <div class="table-wrapper">
                <table id="pulizieTable"></table>
            </div>
        </section>

        <section id="manutenzioniSection" class="register-section hidden">
            <h2>4. Registro Interventi e Manutenzione Strutturale</h2>
            <div class="table-wrapper">
                <table id="manutenzioniTable"></table>
            </div>
        </section>
    </main>

    <div id="dosageModal" class="overlay hidden" onclick="chiudiDosaggio()">
        <div class="dosage-card" onclick="event.stopPropagation()">
            <span class="overlay-close" onclick="chiudiDosaggio()">&times;</span>
            <div id="dosageContent"></div>
        </div>
    </div>

    <div id="chartOverlay" class="overlay hidden" onclick="closeOverlay()">
        <div class="overlay-content" onclick="event.stopPropagation()">
            <span class="overlay-close" onclick="closeOverlay()">&times;</span>
            <h3 id="overlayTitle">Andamento Storico</h3>
            <canvas id="overlayCanvas"></canvas>
        </div>
    </div>

</body>
</html>
