<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina 2026</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
    <header>
        <h1>Dashboard Piscina 2026</h1>
        <p>Analisi automatica dei registri</p>
    </header>

    <nav class="top-buttons">
        <button onclick="showRegister('chimicoSection')">Chimico</button>
        <button onclick="showRegister('contatoriSection')">Contatori</button>
        <button onclick="showRegister('pulizieSection')">Pulizie</button>
        <button onclick="showRegister('manutenzioneSection')">Manutenzioni</button>
    </nav>

    <section id="chimicoSection" class="register-section hidden">
        <h2>Registro Chimico</h2>
        
        <div id="assistente-chimico-container" style="margin: 20px 0;"></div>
        
        <table id="chimicoTable"></table>
    </section>

    <section id="contatoriSection" class="register-section hidden">
        <h2>Registro Contatori</h2>
        <table id="contatoriTable"></table>
    </section>

    <section id="pulizieSection" class="register-section hidden">
        <h2>Registro Pulizie</h2>
        <table id="pulizieTable"></table>
    </section>

    <section id="manutenzioneSection" class="register-section hidden">
        <h2>Registro Manutenzione</h2>
        <table id="manutenzioneTable"></table>
    </section>

    <div id="chartOverlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="overlay-close" onclick="closeOverlay()">✖</span>
            <h3 id="overlayTitle"></h3>
            <canvas id="overlayCanvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
