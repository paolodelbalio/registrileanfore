<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>Dashboard Piscina 2026</h1>
        <p>Seleziona un registro per visualizzare i dati</p>
    </header>

    <div class="top-buttons">
        <button id="btn-chimico" onclick="apriRegistro('chimicoSection', this)">🧪 Chimico</button>
        <button id="btn-contatori" onclick="apriRegistro('contatoriSection', this)">💧 Contatori</button>
        <button id="btn-pulizie" onclick="apriRegistro('pulizieSection', this)">🧹 Pulizie</button>
        <button id="btn-manutenzioni" onclick="apriRegistro('manutenzioniSection', this)">🛠️ Manutenzioni</button>
    </div>

    <section id="chimicoSection" class="register-section hidden">
        <h2>Registro Chimico</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; display: block;">
            <table id="chimicoTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="contatoriSection" class="register-section hidden">
        <h2>Registro Contatori</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; display: block;">
            <table id="contatoriTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="pulizieSection" class="register-section hidden">
        <h2>Registro Pulizie</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; display: block;">
            <table id="pulizieTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="manutenzioniSection" class="register-section hidden">
        <h2>Registro Manutenzioni</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; display: block;">
            <table id="tabellaManutenzioniIsolata" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <div id="chartOverlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="overlay-close" onclick="closeOverlay()">✖</span>
            <h3 id="overlayTitle">Andamento Storico</h3>
            <div style="flex-grow:1; position:relative; width:100%; height:calc(100% - 40px);">
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>
    </div>

    <div id="dosageModal" class="overlay hidden">
        <div class="dosage-card">
            <span class="overlay-close" onclick="chiudiDosaggio()">✖</span>
            <div id="dosageContent"></div>
            <button class="dosage-close-btn" onclick="chiudiDosaggio()">Chiudi Finestra</button>
        </div>
    </div>

    <script>
        function apriRegistro(idSezione, bottoneCliccato) {
            // 1. Nasconde tutte le sezioni dei registri
            document.querySelectorAll('.register-section').forEach(sec => {
                sec.classList.add('hidden');
            });
            
            // 2. Disattiva lo stato visivo di tutti i bottoni
            document.querySelectorAll('.top-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 3. Mostra la sezione desiderata e attiva il bottone corrispondente
            const sezioneAttiva = document.getElementById(idSezione);
            if (sezioneAttiva) {
                sezioneAttiva.classList.remove('hidden');
                
                // Forza il layout engine del browser a svegliarsi e calcolare lo scrollbar orizzontale
                const wrapper = sezioneAttiva.querySelector('.table-wrapper');
                if (wrapper) {
                    wrapper.style.display = 'none';
                    wrapper.offsetHeight; // Forza il reflow genetico della pagina
                    wrapper.style.display = 'block';
                }
            }
            
            bottoneCliccato.classList.add('active');

            // Sveglia Chart.js e ridimensiona le finestre dinamiche
            window.dispatchEvent(new Event('resize'));
        }
    </script>

    <script src="script.js"></script>
    <script src="contatori.js"></script>
    <script src="manutenzioni.js"></script>

</body>
</html>
