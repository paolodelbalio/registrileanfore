<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>Dashboard Piscina 2026</h1>
        <p>Seleziona un registro per visualizzare i dati</p>
    </header>

    <div class="top-buttons">
        <button id="btn-chimico" onclick="apriRegistro('chimicoSection', this)">🧪 Chimico</button>
        <button id="btn-contatori" onclick="apriRegistro('contatoriSection', this)">💧 Contatori</button>
        <button id="btn-pulizie" onclick="apriRegistro('pulizieSection', this)">🧹 Pulizie</button>
        <button id="btn-manutenzioni" onclick="apriRegistro('manutenzioniSection', this)">🛠️ Manutenzioni</button>
    </div>

    <section id="chimicoSection" class="register-section hidden">
        <h2>Registro Chimico</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="chimicoTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="contatoriSection" class="register-section hidden">
        <h2>Registro Contatori</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="contatoriTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="pulizieSection" class="register-section hidden">
        <h2>Registro Pulizie</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="pulizieTable" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <section id="manutenzioniSection" class="register-section hidden">
        <h2>Registro Manutenzioni</h2>
        <div class="table-wrapper" style="overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; max-height: 70vh; overflow-y: auto;">
            <table id="tabellaManutenzioniIsolata" style="width: 100%; min-width: 800px;"></table>
        </div>
    </section>

    <div id="chartOverlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="overlay-close" onclick="closeOverlay()">✖</span>
            <h3 id="overlayTitle">Andamento Storico</h3>
            <div style="flex-grow:1; position:relative; width:100%; height:calc(100% - 40px);">
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>
    </div>

    <div id="dosageModal" class="overlay hidden">
        <div class="dosage-card">
            <span class="overlay-close" onclick="chiudiDosaggio()">✖</span>
            <div id="dosageContent"></div>
            <button class="dosage-close-btn" onclick="chiudiDosaggio()">Chiudi Finestra</button>
        </div>
    </div>

    <script>
        function apriRegistro(idSezione, bottoneCliccato) {
            // 1. Nasconde tutte le sezioni
            document.querySelectorAll('.register-section').forEach(sec => {
                sec.classList.add('hidden');
            });
            
            // 2. Disattiva lo stato visivo di tutti i bottoni
            document.querySelectorAll('.top-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 3. Mostra la sezione desiderata
            const sezioneAttiva = document.getElementById(idSezione);
            if (sezioneAttiva) {
                sezioneAttiva.classList.remove('hidden');
                bottoneCliccato.classList.add('active');
                
                window.dispatchEvent(new Event('resize'));

                // 4. POSIZIONAMENTO SULL'ULTIMA RIGA COMPILATA (RIFERIMENTO pH)
                setTimeout(() => {
                    const wrapper = sezioneAttiva.querySelector('.table-wrapper');
                    const tabella = sezioneAttiva.querySelector('table');
                    
                    if (wrapper && tabella) {
                        const righe = tabella.querySelectorAll('tbody tr');
                        let indiceRigaPresente = -1;

                        // Analizziamo dal basso verso l'alto per trovare l'ultimo inserimento vero
                        for (let i = righe.length - 1; i >= 0; i--) {
                            let celle = righe[i].querySelectorAll('td');
                            let rigaValida = false;

                            if (idSezione === 'chimicoSection') {
                                // Nel chimico, controlliamo dove c'è un pH valido (valore numerico es. tra 6.0 e 8.5)
                                celle.forEach(td => {
                                    let testo = td.textContent.trim().replace(',', '.');
                                    let num = parseFloat(testo);
                                    if (!isNaN(num) && num >= 6.0 && num <= 8.5) {
                                        rigaValida = true;
                                    }
                                });
                            } else {
                                // Per gli altri registri, controlliamo la presenza di dati nelle colonne centrali
                                if (celle.length > 2 && celle[1].textContent.trim() !== "" && celle[1].textContent.trim() !== "0") {
                                    rigaValida = true;
                                }
                            }

                            if (rigaValida) {
                                indiceRigaPresente = i;
                                break;
                            }
                        }

                        // Se abbiamo trovato il presente, calcoliamo il blocco includendo ESATTAMENTE le 2 righe sotto
                        if (indiceRigaPresente !== -1) {
                            // Scegliamo come riga visibile finale quella del presente + 2 righe vuote successive
                            let rigaTargetInquadratura = righe[Math.min(indiceRigaPresente + 2, righe.length - 1)];
                            
                            if (rigaTargetInquadratura) {
                                // Allinea l'inquadratura in modo che la riga target si trovi sul fondo del contenitore visibile
                                let posizioneTop = rigaTargetInquadratura.offsetTop;
                                let altezzaWrapper = wrapper.clientHeight;
                                
                                wrapper.scrollTop = posizioneTop - altezzaWrapper + rigaTargetInquadratura.clientHeight + 20;
                                return;
                            }
                        }
                        
                        // Emergenza (se tutto è vuoto): vai in cima
                        wrapper.scrollTop = 0;
                    }
                }, 250);
            }
        }
    </script>

</body>
</html>
