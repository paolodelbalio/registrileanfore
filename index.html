<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Dashboard Piscina 2026</h1></header>

    <div class="top-buttons">
        <button class="tab-button" onclick="mostraTab('chimicoSection')">Chimico</button>
        <button class="tab-button" onclick="mostraTab('contatoriSection')">Contatori</button>
        <button class="tab-button" onclick="mostraTab('pulizieSection')">Pulizie</button>
    </div>

    <div id="chimicoSection" class="register-section">
        <h2>Registro Chimico</h2>
        <table id="chimicoTable"></table>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="script.js"></script>
    <script>
        function mostraTab(id) {
            document.querySelectorAll('.register-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
