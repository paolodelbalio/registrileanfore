<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Piscina 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Dashboard Piscina 2026</h1>
</header>

<div class="top-buttons">
    <button class="tab-button active" onclick="openTab('chimico')">Chimico</button>
    <button class="tab-button" onclick="openTab('contatori')">Contatori</button>
    <button class="tab-button" onclick="openTab('pulizie')">Pulizie</button>
    <button class="tab-button" onclick="openTab('manutenzioni')">Manutenzioni</button>
</div>

<div class="container">
    <div id="chimico" class="tab-content">
        <h2>Registro Chimico</h2>
        </div>

    <div id="contatori" class="tab-content" style="display:none;">
        <h2>Registro Contatori</h2>
        </div>

    <div id="pulizie" class="tab-content" style="display:none;">
        <h2>Registro Pulizie</h2>
        </div>

    <div id="manutenzioni" class="tab-content" style="display:none;">
        <h2>Registro Manutenzioni</h2>
        <table>
            <thead>
                <tr><th>Data</th><th>Impianto/Area</th><th>Intervento</th><th>Tecnico</th><th>Note</th></tr>
            </thead>
            <tbody id="manutenzioni-body"></tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
<script>
    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(div => div.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
