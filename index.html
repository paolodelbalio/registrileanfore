<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Piscina - Registro Chimico</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>Dashboard Piscina 2026</h1>
        <p>Monitoraggio Isolato - Registro Chimico</p>
    </header>

    <div class="top-buttons">
        <button id="btn-chimico" class="active">🧪 Chimico</button>
        <button id="btn-contatori">💧 Contatori</button>
        <button id="btn-pulizie">🧹 Pulizie</button>
        <button id="btn-manutenzioni">🛠️ Manutenzioni</button>
    </div>

    <section id="chimicoSection" class="register-section">
        <h2>Registro Chimico</h2>
        <div class="table-wrapper">
            <table id="chimicoTable"></table>
        </div>
    </section>

    <div id="chartOverlay" class="overlay hidden">
        <div class="overlay-content">
            <span class="overlay-close" onclick="closeOverlay()">✖</span>
            <h3 id="overlayTitle">Andamento Storico</h3>
            <div style="flex-grow:1; position:relative; width:100%; height:calc(100% - 40px);">
                <canvas id="overlayCanvas"></canvas>
            </div>
        </div>
    </div>

    <div id="dosageModal" class="overlay hidden">
        <div class="dosage-card">
            <span class="overlay-close" onclick="chiudiDosaggio()">✖</span>
            <div id="dosageContent"></div>
            <button class="dosage-close-btn" onclick="chiudiDosaggio()">Chiudi Finestra</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
